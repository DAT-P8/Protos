syntax = "proto3";

package ngw.v1;

option csharp_namespace = "GW2D.V1";

enum Action {
  ACTION_UNKNOWN_UNSPECIFIED = 0;
  ACTION_NOTHING = 1;
  ACTION_LEFT = 2;
  ACTION_LEFT_UP = 3;
  ACTION_UP = 4;
  ACTION_RIGHT_UP = 5;
  ACTION_RIGHT = 6;
  ACTION_RIGHT_DOWN = 7;
  ACTION_DOWN = 8;
  ACTION_LEFT_DOWN = 9;
}

message DroneState {
  int64 id = 1;
  int64 x = 2;
  int64 y = 3;
  bool destroyed = 4;
  bool is_evader = 5;
}

message State {
  int64 sim_id = 1;
  bool terminated = 2;
  repeated DroneState drone_states = 3;
  repeated Event events = 4;
}

message Event {
  oneof event_oneof {
    CollisionEvent collision_event = 1;
    TargetReachedEvent target_reached_event = 2;
    OutOfBoundsEvent out_of_bounds_event = 3;
    PursuerEnteredTargetEvent pursuer_entered_target_event = 4;
    DroneObjectCollisionEvent drone_object_collision_event = 5;
  }
}

message DroneObjectCollisionEvent {
  repeated int64 drone_ids = 1;
}

message CollisionEvent {
  repeated int64 drone_ids = 1;
}

message TargetReachedEvent {
  repeated int64 drone_ids = 1;
}

message OutOfBoundsEvent {
  repeated int64 drone_ids = 1;
}

message PursuerEnteredTargetEvent {
  repeated int64 drone_ids = 1;
}

message MapSpec {
  oneof map_oneof {
    SquareMap square_map = 1;
  }
}

message SquareMap {
  int64 width = 1;
  int64 height = 2;
  int64 target_x = 3;
  int64 target_y = 4;

  repeated ObjectSpec objects = 5;
}

message ObjectSpec {
  oneof object_oneof {
    SquareObject square_object = 1;
  }
}

message SquareObject {
  int64 x = 1;
  int64 y = 2;
}

message DroneAction {
  int64 id = 1;
  Action action = 2;
  int64 velocity = 3;
}

message StateResponse {
  oneof state_or_error {
    State state = 1;
    string error_message = 2;
  }
}

message DoStepRequest {
  int64 sim_id = 1;
  repeated DroneAction drone_actions = 2;
}

message DoStepResponse {
  StateResponse state_response = 1;
}

message ResetRequest {
  int64 sim_id = 1;
}

message ResetResponse {
  StateResponse state_response = 1;
}

message CloseRequest {
  int64 sim_id = 1;
}

message CloseResponse {
  optional string error_message = 1;
}

message NewRequest {
  MapSpec map = 1;
  int64 evader_count = 2;
  int64 pursuer_count = 3;
}

message NewResponse {
  StateResponse state_response = 1;
}

service SimulationService {
  // Progress the simulation by specifying the actions to be taken by all drones.
  // The client receives the new state of the simulation
  rpc DoStep (DoStepRequest) returns (DoStepResponse) {}

  // Start a new simulation by calling New.
  // Sender will receive an id which uniquely identifies the simulation.
  // Returns the initial state of the simulation
  rpc New (NewRequest) returns (NewResponse) {}

  // Reset a current simulation by calling Reset.
  // This should be equivalent to calling Close and New.
  // Returns the initial state of the simulation.
  rpc Reset (ResetRequest) returns (ResetResponse) {}

  // Closes a simulation and frees any resources it holds.
  // This should be called when a simulation is done.
  rpc Close (CloseRequest) returns (CloseResponse) {}
}
