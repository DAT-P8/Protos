syntax = "proto3";

option csharp_namespace = "GWSimulation";

enum GWAction {
  UNKNOWN = 0;
  NOTHING = 1;
  LEFT = 2;
  RIGHT = 3;
  UP = 4;
  DOWN = 5;
}

message GWDroneState {
  int64 id = 1;
  int64 x = 2;
  int64 y = 3;
  bool destroyed = 4;
}

message GWState {
  bool terminated = 1;
  repeated GWDroneState defender_drone_states = 2;
  repeated GWDroneState evader_drone_states = 3;
}

message GWDroneAction {
  int64 id = 1;
  GWAction action = 2;
}

message GWActionRequest {
  int64 id = 1;
  repeated GWDroneAction actions = 2;
}

message GWActionResponse {
  oneof state_or_error {
    GWState state = 1;
    string error_message = 2;
  }
}

message GWResetRequest {
  int64 id = 1;
}

message GWResetResponse {
  GWState state = 1;
}

message GWCloseRequest {
  int64 id = 1;
}

message GWCloseResponse {}

service GWSimulation {
  rpc DoStep (GWActionRequest) returns (GWActionResponse) {}
  rpc Reset (GWResetRequest) returns (GWResetResponse) {}
  rpc Close (GWCloseRequest) returns (GWCloseResponse) {}
}
