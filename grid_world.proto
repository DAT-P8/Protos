// We use proto3, not proto2.
syntax = "proto3";

// This is to make sure gRPC doesn't clutter the global namespace.
option csharp_namespace = "GWSimulation";

// The actions each drone may take.
// Note that UNKNOWN is reserved for null-coercions to int. This is a standard practice.
// We also do not allow for diagonal actions!
enum GWAction {
  UNKNOWN = 0;
  NOTHING = 1;
  LEFT = 2;
  RIGHT = 3;
  UP = 4;
  DOWN = 5;
}


// This is the state of a drone.
// The id of the individual drone.
// Their (x,y) coordinates in a [0; 10] GridWorld.
// A boolean if it is destroyed.
// A boolean if it is an evader.
message GWDroneState {
  int64 id = 1;
  int64 x = 2;
  int64 y = 3;
  bool destroyed = 4;
  bool is_evader = 5;
}

// This represents the states of the simulation
enum SimStates{
    Unknown = 0;
    Running = 1;
    EvadersCaptured = 2;
    EvadersCrashed = 3;
    TargetReached = 4;
    PursuersCrashed = 5;
    TimeExceeded = 6;
}

// This is the GridWorld state.
// It is the state of each drone, and
// a boolean determining whether the simulation has terminated.
// Termination of a simulation may be done by the server.
// E.g. evader reaches target, or evader is destroyed or fled.
message GWState {
  SimStates simulation_state = 1;
  int32 obstacles = 2;
  int32 target_x = 3;
  int32 target_y = 4;
  repeated GWDroneState drone_states = 5;
}


// This is how we model a drone action.
// The id of the individual drone,
// and the action to be taken.
message GWDroneAction {
  int64 id = 1;
  GWAction action = 2;
}


// The request sent by calls to DoStep
// Speicifies the id of the simulation and the actions of each individual drone.
// If the caller sends an action to a drone which doesn't exist, 
// then the action is simply ignored!
message GWActionRequest {
  int64 id = 1;
  repeated GWDroneAction drone_actions = 2;
}


// The response received from calls to DoStep
// This call can error. If you call DoStep on a
// simulation that doesn't exist, i.e. with a wrong id,
// then we return an error_message.
// Otherwise we return the state.
message GWActionResponse {
  oneof state_or_error {
    GWState state = 1;
    string error_message = 2;
  }
}

// The request sent by calls to Reset
// Specifies the id of the simulation to be reset
message GWResetRequest {
  int64 id = 1;
}

// The response received from calls to Reset
// This response returns the initial state of the simulation
message GWResetResponse {
  GWState state = 1;
}

// The request sent from calls to Close
// Only specifies the id of the simulation to be closed.
message GWCloseRequest {
  int64 id = 1;
}

// The response received from calls to Close
// This is just an empty response.
message GWCloseResponse {}

// The request from calls to New
// The client asks for a new simulation.
// This is an empty request.
message GWNewRequest {}

// The response returned from calls to New
// Contains the initial state and the id of the simulation
message GWNewResponse {
  int64 id = 1;
  GWState state = 2;
}

service GWSimulation {
  // Progress the simulation by specifying the actions to be taken by all drones.
  // The client receives the new state of the simulation
  rpc DoStep (GWActionRequest) returns (GWActionResponse) {}

  // Start a new simulation by calling New.
  // Sender will receive an id which uniquely identifies the simulation.
  // Returns the initial state of the simulation
  rpc New (GWNewRequest) returns (GWNewResponse) {}

  // Reset a current simulation by calling Reset.
  // This should be equivalent to calling Close and New.
  // Returns the initial state of the simulation.
  rpc Reset (GWResetRequest) returns (GWResetResponse) {}

  // Closes a simulation and frees any resources it holds.
  // This should be called when a simulation is done.
  rpc Close (GWCloseRequest) returns (GWCloseResponse) {}
}
